<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Reset your password</title></head>
<body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2>Password Reset — UniTalent</h2>
  <p>Hi <strong>{{ username }}</strong>,</p>
  <p>We received a request to reset your password. Click the button below:</p>
  <a href="{{ reset_url }}"
     style="display:inline-block;padding:12px 24px;background:#DC2626;color:#fff;text-decoration:none;border-radius:6px;">
    Reset Password
  </a>
  <p style="margin-top:20px;color:#6B7280;font-size:14px;">
    Link expires in 1 hour. If you did not request this, ignore this email.
  </p>
</body>
</html>
